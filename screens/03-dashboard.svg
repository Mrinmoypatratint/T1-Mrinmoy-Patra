<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <radialGradient id="topGlow" cx="20%" cy="10%" r="50%">
      <stop offset="0%" stop-color="rgba(37, 99, 235, 0.15)" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <linearGradient id="primaryBtn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#9333ea" />
    </linearGradient>
  </defs>

  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  </style>

  <rect width="1280" height="720" fill="url(#bg)" />
  <rect width="1280" height="720" fill="url(#topGlow)" />

  <!-- Navbar -->
  <rect x="0" y="0" width="1280" height="64" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  
  <g transform="translate(120, 16)">
    <!-- Logo -->
    <rect x="0" y="0" width="32" height="32" rx="8" fill="rgba(59, 130, 246, 0.2)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <path d="M16 8 L8 12 L16 16 L24 12 Z" fill="none" stroke="#93c5fd" stroke-width="1.5" />
    <path d="M8 18 L16 22 L24 18" fill="none" stroke="#93c5fd" stroke-width="1.5" />
    <text x="42" y="22" fill="white" font-size="16" font-weight="bold">Quiz Portal</text>
  </g>

  <!-- Nav Links -->
  <g transform="translate(940, 16)">
    <rect x="0" y="0" width="90" height="32" rx="8" fill="rgba(255,255,255,0.05)" />
    <text x="45" y="21" fill="white" font-size="14" text-anchor="middle">Quizzes</text>
    <text x="135" y="21" fill="rgba(255,255,255,0.7)" font-size="14" text-anchor="middle">History</text>
    
    <!-- User Avatar -->
    <circle cx="210" cy="16" r="16" fill="url(#logoBg)" />
    <text x="210" y="21" fill="white" font-size="14" font-weight="bold" text-anchor="middle">U</text>
  </g>

  <!-- Main Content -->
  <g transform="translate(120, 140)">
    
    <!-- Welcome Header Glass Card -->
    <text x="0" y="0" fill="rgba(255,255,255,0.45)" font-size="11" font-weight="bold" letter-spacing="2">TODAY'S LEARNING PICKS</text>
    <rect x="0" y="15" width="1040" height="150" rx="16" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    
    <text x="24" y="60" fill="white" font-size="28" font-weight="bold">Hey User, ready for one more round? 👋</text>
    <text x="24" y="90" fill="rgba(255,255,255,0.55)" font-size="18">Pick a quiz, keep the streak alive, and compare how you improve over time.</text>
    
    <!-- Divider in welcome card -->
    <line x1="24" y1="120" x2="1016" y2="120" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
    <text x="24" y="145" fill="rgba(255,255,255,0.35)" font-size="12" font-weight="bold" letter-spacing="1">TIP: FINISHING SHORT QUIZZES CONSISTENTLY BEATS CRAMMING.</text>

    <!-- Quiz Grid -->
    <g transform="translate(0, 195)">
      
      <!-- Card 1 -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="326" height="220" rx="16" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
        <text x="24" y="32" fill="white" font-size="18" font-weight="bold">JavaScript Fundamentals</text>
        <text x="24" y="60" fill="rgba(255,255,255,0.5)" font-size="14">Test your knowledge of core JavaScript</text>
        <text x="24" y="80" fill="rgba(255,255,255,0.5)" font-size="14">concepts including variables, arrays,</text>
        <text x="24" y="100" fill="rgba(255,255,255,0.5)" font-size="14">and simple loops.</text>
        
        <!-- Stats -->
        <circle cx="30" cy="130" r="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
        <text x="44" y="135" fill="rgba(255,255,255,0.4)" font-size="12">15 questions</text>
        
        <circle cx="140" cy="130" r="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
        <text x="154" y="135" fill="rgba(255,255,255,0.4)" font-size="12">10 min</text>
        
        <!-- Action Button -->
        <rect x="24" y="160" width="278" height="40" rx="10" fill="url(#primaryBtn)" />
        <text x="163" y="185" fill="white" font-size="14" font-weight="bold" text-anchor="middle">Start quiz</text>
      </g>
      
      <!-- Card 2 (Completed) -->
      <g transform="translate(356, 0)">
        <rect x="0" y="0" width="326" height="220" rx="16" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
        <text x="24" y="32" fill="white" font-size="18" font-weight="bold">React Basics</text>
        <text x="24" y="60" fill="rgba(255,255,255,0.5)" font-size="14">A quick check on React component</text>
        <text x="24" y="80" fill="rgba(255,255,255,0.5)" font-size="14">lifecycle, hooks, and basic</text>
        <text x="24" y="100" fill="rgba(255,255,255,0.5)" font-size="14">state management.</text>
        
        <circle cx="30" cy="130" r="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
        <text x="44" y="135" fill="rgba(255,255,255,0.4)" font-size="12">20 questions</text>
        
        <circle cx="140" cy="130" r="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
        <text x="154" y="135" fill="rgba(255,255,255,0.4)" font-size="12">15 min</text>
        
        <!-- Completed Badge -->
        <rect x="24" y="160" width="278" height="40" rx="10" fill="rgba(16, 185, 129, 0.1)" stroke="rgba(16, 185, 129, 0.2)" stroke-width="1" />
        <circle cx="95" cy="180" r="6" fill="none" stroke="#34d399" stroke-width="1.5" />
        <text x="110" y="185" fill="#34d399" font-size="14" font-weight="bold">Completed · Nice work</text>
      </g>
      
      <!-- Card 3 -->
      <g transform="translate(712, 0)">
        <rect x="0" y="0" width="326" height="220" rx="16" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
        <text x="24" y="32" fill="white" font-size="18" font-weight="bold">Modern CSS Grids</text>
        <text x="24" y="60" fill="rgba(255,255,255,0.5)" font-size="14">Master CSS Grid layouts, track</text>
        <text x="24" y="80" fill="rgba(255,255,255,0.5)" font-size="14">sizing, alignment, and complex UI</text>
        <text x="24" y="100" fill="rgba(255,255,255,0.5)" font-size="14">structures in the browser.</text>
        
        <circle cx="30" cy="130" r="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
        <text x="44" y="135" fill="rgba(255,255,255,0.4)" font-size="12">12 questions</text>
        
        <circle cx="140" cy="130" r="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
        <text x="154" y="135" fill="rgba(255,255,255,0.4)" font-size="12">8 min</text>
        
        <rect x="24" y="160" width="278" height="40" rx="10" fill="url(#primaryBtn)" />
        <text x="163" y="185" fill="white" font-size="14" font-weight="bold" text-anchor="middle">Start quiz</text>
      </g>
      
    </g>

  </g>

</svg>