<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <radialGradient id="leftGlow" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(37, 99, 235, 0.15)" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <radialGradient id="rightGlow" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="rgba(147, 51, 234, 0.1)" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <linearGradient id="primaryBtn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
  </defs>

  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  </style>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)" />
  <rect width="1280" height="720" fill="url(#leftGlow)" />
  <rect width="1280" height="720" fill="url(#rightGlow)" />

  <!-- Left Side: Branding -->
  <g transform="translate(120, 180)">
    <!-- Logo -->
    <rect x="0" y="0" width="56" height="56" rx="14" fill="url(#primaryBtn)" />
    <path d="M28 16 L14 24 L28 32 L42 24 Z" fill="none" stroke="white" stroke-width="2.5" />
    <path d="M14 34 L28 42 L42 34" fill="none" stroke="white" stroke-width="2.5" />
    <text x="76" y="38" fill="white" font-size="34" font-weight="bold">Quiz Portal</text>

    <!-- Tagline -->
    <text x="0" y="140" fill="white" font-size="52" font-weight="bold">Learn in small wins,</text>
    <text x="0" y="210" fill="url(#textGradient)" font-size="52" font-weight="bold">track your growth</text>
    
    <!-- Desc -->
    <text x="0" y="270" fill="rgba(255,255,255,0.6)" font-size="20">Bite-sized quizzes, immediate feedback, and a</text>
    <text x="0" y="300" fill="rgba(255,255,255,0.6)" font-size="20">clean history of what you nailed (and what to</text>
    <text x="0" y="330" fill="rgba(255,255,255,0.6)" font-size="20">revisit).</text>

    <!-- Features -->
    <g transform="translate(0, 390)">
      <rect x="0" y="0" width="44" height="44" rx="10" fill="rgba(255,255,255,0.05)" />
      <path d="M26 14 L16 26 L22 26 L20 34 L30 22 L24 22 Z" fill="none" stroke="#60a5fa" stroke-width="2" />
      <text x="60" y="18" fill="white" font-size="18" font-weight="bold">Instant Results</text>
      <text x="60" y="40" fill="rgba(255,255,255,0.5)" font-size="15">Get your score &amp; detailed review immediately</text>
    </g>

    <g transform="translate(0, 460)">
      <rect x="0" y="0" width="44" height="44" rx="10" fill="rgba(255,255,255,0.05)" />
      <path d="M22 14 L14 18 L14 26 C14 32 22 36 22 36 C22 36 30 32 30 26 L30 18 Z M22 28 L18 24 L20 22 L22 24 L26 18 L28 20 Z" fill="none" stroke="#60a5fa" stroke-width="2" />
      <text x="60" y="18" fill="white" font-size="18" font-weight="bold">Secure &amp; Fair</text>
      <text x="60" y="40" fill="rgba(255,255,255,0.5)" font-size="15">Timed quizzes with one attempt per quiz</text>
    </g>
  </g>

  <!-- Right Side: Auth Form -->
  <g transform="translate(720, 100)">
    <rect x="0" y="0" width="460" height="520" rx="24" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    
    <text x="40" y="55" fill="rgba(255,255,255,0.45)" font-size="12" font-weight="bold" letter-spacing="2">WELCOME BACK</text>
    <text x="40" y="95" fill="white" font-size="28" font-weight="bold">Sign in</text>
    <text x="40" y="125" fill="rgba(255,255,255,0.5)" font-size="16">Let's continue where you left off.</text>

    <!-- Email Field -->
    <text x="40" y="175" fill="rgba(255,255,255,0.7)" font-size="14" font-weight="bold">Email</text>
    <rect x="40" y="185" width="380" height="48" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" />
    <!-- Mail Icon -->
    <path d="M55 205 L75 205 C77 205 78 206 78 208 L78 220 C78 222 77 223 75 223 L55 223 C53 223 52 222 52 220 L52 208 C52 206 53 205 55 205 Z M52 208 L65 215 L78 208" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" />
    <text x="90" y="215" fill="rgba(255,255,255,0.3)" font-size="15">you@example.com</text>

    <!-- Password Field -->
    <text x="40" y="265" fill="rgba(255,255,255,0.7)" font-size="14" font-weight="bold">Password</text>
    <rect x="40" y="275" width="380" height="48" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" />
    <!-- Lock Icon -->
    <path d="M57 295 L73 295 L73 309 L57 309 Z M61 295 L61 289 C61 286 69 286 69 289 L69 295" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" />
    <text x="90" y="308" fill="rgba(255,255,255,0.3)" font-size="20" letter-spacing="4">••••••••</text>

    <!-- Submit Button -->
    <rect x="40" y="350" width="380" height="48" rx="12" fill="url(#primaryBtn)" />
    <text x="230" y="380" fill="white" font-size="16" font-weight="bold" text-anchor="middle">Continue</text>

    <!-- Divider -->
    <line x1="40" y1="430" x2="420" y2="430" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <rect x="160" y="420" width="140" height="20" fill="#0c1221" />
    <text x="230" y="435" fill="rgba(255,255,255,0.4)" font-size="14" text-anchor="middle">or continue with</text>

    <!-- Google Button -->
    <rect x="40" y="460" width="380" height="48" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" />
    <!-- Simple G icon -->
    <path d="M208 484 C208 479 203 475 198 475 C193 475 188 479 188 484 C188 489 193 493 198 493 C201 493 204 492 206 489 L200 489 M208 484 L198 484" fill="none" stroke="white" stroke-width="3" />
    <text x="230" y="490" fill="white" font-size="16" font-weight="bold">Continue with Google</text>
  </g>

  <!-- Signup Link -->
  <text x="950" y="660" fill="rgba(255,255,255,0.4)" font-size="14" text-anchor="middle">Don't have an account? <tspan fill="#60a5fa" font-weight="bold">Sign up</tspan></text>

</svg>