<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <radialGradient id="topGlow" cx="20%" cy="10%" r="50%">
      <stop offset="0%" stop-color="rgba(37, 99, 235, 0.15)" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <linearGradient id="primaryBtn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  </style>

  <rect width="1280" height="720" fill="url(#bg)" />
  <rect width="1280" height="720" fill="url(#topGlow)" />

  <!-- Navbar -->
  <rect x="0" y="0" width="1280" height="64" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  
  <g transform="translate(120, 16)">
    <rect x="0" y="0" width="32" height="32" rx="8" fill="rgba(59, 130, 246, 0.2)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <path d="M16 8 L8 12 L16 16 L24 12 Z" fill="none" stroke="#93c5fd" stroke-width="1.5" />
    <path d="M8 18 L16 22 L24 18" fill="none" stroke="#93c5fd" stroke-width="1.5" />
    <text x="42" y="22" fill="white" font-size="16" font-weight="bold">Quiz Portal</text>
  </g>
  <g transform="translate(850, 16)">
    <text x="0" y="21" fill="rgba(255,255,255,0.7)" font-size="14">Quizzes</text>
    <text x="70" y="21" fill="rgba(255,255,255,0.7)" font-size="14">History</text>
    <text x="140" y="21" fill="#60a5fa" font-size="14">+ Create Quiz</text>
    
    <rect x="245" y="0" width="90" height="32" rx="8" fill="rgba(59, 130, 246, 0.1)" />
    <text x="290" y="21" fill="#60a5fa" font-size="14" text-anchor="middle">Manage</text>
  </g>

  <!-- Main Content -->
  <g transform="translate(160, 110)">
    <text x="0" y="0" fill="white" font-size="28" font-weight="bold">Manage Quizzes</text>
    <text x="0" y="28" fill="rgba(255,255,255,0.5)" font-size="16">Edit or delete your quizzes.</text>

    <!-- Header Action -->
    <rect x="830" y="-15" width="130" height="42" rx="10" fill="url(#primaryBtn)" />
    <text x="895" y="11" fill="white" font-size="14" font-weight="bold" text-anchor="middle">+ Create Quiz</text>

    <!-- Quiz Item 1 (View Mode) -->
    <g transform="translate(0, 80)">
      <rect x="0" y="0" width="960" height="110" rx="16" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
      
      <text x="24" y="35" fill="white" font-size="18" font-weight="bold">JavaScript Fundamentals</text>
      <text x="24" y="60" fill="rgba(255,255,255,0.4)" font-size="14">Test your knowledge of core JavaScript concepts including variables...</text>
      
      <circle cx="30" cy="85" r="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
      <text x="44" y="90" fill="rgba(255,255,255,0.4)" font-size="12">15 questions</text>
      
      <circle cx="140" cy="85" r="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
      <text x="154" y="90" fill="rgba(255,255,255,0.4)" font-size="12">10 min</text>

      <circle cx="210" cy="85" r="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
      <text x="224" y="90" fill="rgba(255,255,255,0.4)" font-size="12">24 attempts</text>

      <!-- Actions -->
      <g transform="translate(800, 35)">
        <rect x="0" y="0" width="40" height="40" rx="8" fill="rgba(255,255,255,0.05)" />
        <path d="M12 28 L16 28 L28 16 L24 12 L12 24 Z" fill="none" stroke="#60a5fa" stroke-width="1.5" />
        
        <rect x="50" y="0" width="40" height="40" rx="8" fill="rgba(255,255,255,0.05)" />
        <path d="M12 20 C12 20 16 14 20 14 C24 14 28 20 28 20 C28 20 24 26 20 26 C16 26 12 20 12 20 Z" fill="none" stroke="#34d399" stroke-width="1.5" />
        
        <rect x="100" y="0" width="40" height="40" rx="8" fill="rgba(255,255,255,0.05)" />
        <path d="M14 14 L26 14 M18 14 L18 28 M22 14 L22 28 M16 12 L24 12" fill="none" stroke="#f87171" stroke-width="1.5" />
      </g>
    </g>

    <!-- Quiz Item 2 (Edit Mode) -->
    <g transform="translate(0, 210)">
      <rect x="0" y="0" width="960" height="230" rx="16" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
      
      <text x="24" y="30" fill="rgba(255,255,255,0.6)" font-size="14" font-weight="bold">Title</text>
      <rect x="24" y="40" width="912" height="44" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
      <text x="40" y="67" fill="white" font-size="14">React Basics</text>

      <text x="24" y="110" fill="rgba(255,255,255,0.6)" font-size="14" font-weight="bold">Description</text>
      <rect x="24" y="120" width="400" height="44" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
      <text x="40" y="147" fill="white" font-size="14">A quick check on React components</text>
      
      <text x="460" y="110" fill="rgba(255,255,255,0.6)" font-size="14" font-weight="bold">Time Limit (seconds)</text>
      <rect x="460" y="120" width="160" height="44" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
      <text x="476" y="147" fill="white" font-size="14">900</text>

      <!-- Save buttons -->
      <g transform="translate(24, 185)">
        <rect x="0" y="0" width="90" height="32" rx="8" fill="url(#primaryBtn)" />
        <text x="45" y="21" fill="white" font-size="13" font-weight="bold" text-anchor="middle">Save</text>

        <rect x="100" y="0" width="90" height="32" rx="8" fill="rgba(255,255,255,0.1)" />
        <text x="145" y="21" fill="white" font-size="13" font-weight="bold" text-anchor="middle">Cancel</text>
      </g>
    </g>

  </g>

</svg>