<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(37, 99, 235, 0.15)" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <linearGradient id="primaryBtn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#9333ea" />
    </linearGradient>
  </defs>

  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  </style>

  <rect width="1280" height="720" fill="url(#bg)" />
  <rect width="1280" height="720" fill="url(#centerGlow)" />

  <!-- Logo top center -->
  <g transform="translate(560, 50)">
    <rect x="0" y="0" width="44" height="44" rx="12" fill="url(#logoBg)" />
    <path d="M22 12 L11 18 L22 24 L33 18 Z" fill="none" stroke="white" stroke-width="2" />
    <path d="M11 26 L22 32 L33 26" fill="none" stroke="white" stroke-width="2" />
    <text x="56" y="28" fill="white" font-size="24" font-weight="bold">Quiz Portal</text>
  </g>

  <!-- Auth Form -->
  <g transform="translate(410, 130)">
    <rect x="0" y="0" width="460" height="510" rx="24" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    
    <text x="40" y="45" fill="rgba(255,255,255,0.45)" font-size="12" font-weight="bold" letter-spacing="2">NEW HERE?</text>
    <text x="40" y="80" fill="white" font-size="28" font-weight="bold">Create your account</text>
    <text x="40" y="110" fill="rgba(255,255,255,0.5)" font-size="16">It takes less than a minute.</text>

    <!-- Full Name Field -->
    <text x="40" y="150" fill="rgba(255,255,255,0.7)" font-size="14" font-weight="bold">Full Name</text>
    <rect x="40" y="160" width="380" height="44" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" />
    <text x="80" y="187" fill="rgba(255,255,255,0.3)" font-size="15">John Doe</text>

    <!-- Email Field -->
    <text x="40" y="230" fill="rgba(255,255,255,0.7)" font-size="14" font-weight="bold">Email</text>
    <rect x="40" y="240" width="380" height="44" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" />
    <text x="80" y="267" fill="rgba(255,255,255,0.3)" font-size="15">you@example.com</text>

    <!-- Password Field -->
    <text x="40" y="310" fill="rgba(255,255,255,0.7)" font-size="14" font-weight="bold">Password</text>
    <rect x="40" y="320" width="380" height="44" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" />
    <text x="80" y="347" fill="rgba(255,255,255,0.3)" font-size="20" letter-spacing="4">••••••••</text>

    <!-- Submit Button -->
    <rect x="40" y="385" width="380" height="44" rx="12" fill="url(#primaryBtn)" />
    <text x="230" y="413" fill="white" font-size="16" font-weight="bold" text-anchor="middle">Create account</text>

    <!-- Divider -->
    <line x1="40" y1="450" x2="420" y2="450" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <rect x="160" y="440" width="140" height="20" fill="#0C1322" />
    <text x="230" y="455" fill="rgba(255,255,255,0.4)" font-size="14" text-anchor="middle">or continue with Google</text>
  </g>

  <!-- Login Link -->
  <text x="640" y="680" fill="rgba(255,255,255,0.4)" font-size="14" text-anchor="middle">Already have an account? <tspan fill="#60a5fa" font-weight="bold">Sign in</tspan></text>

</svg>