<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <radialGradient id="topGlow" cx="20%" cy="10%" r="50%">
      <stop offset="0%" stop-color="rgba(37, 99, 235, 0.15)" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
  </defs>

  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  </style>

  <rect width="1280" height="720" fill="url(#bg)" />
  <rect width="1280" height="720" fill="url(#topGlow)" />

  <!-- Navbar -->
  <rect x="0" y="0" width="1280" height="64" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <g transform="translate(120, 16)">
    <rect x="0" y="0" width="32" height="32" rx="8" fill="rgba(59, 130, 246, 0.2)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <path d="M16 8 L8 12 L16 16 L24 12 Z" fill="none" stroke="#93c5fd" stroke-width="1.5" />
    <path d="M8 18 L16 22 L24 18" fill="none" stroke="#93c5fd" stroke-width="1.5" />
    <text x="42" y="22" fill="white" font-size="16" font-weight="bold">Quiz Portal</text>
  </g>
  <g transform="translate(940, 16)">
    <rect x="0" y="0" width="90" height="32" rx="8" fill="rgba(255,255,255,0.05)" />
    <text x="45" y="21" fill="rgba(255,255,255,0.7)" font-size="14" text-anchor="middle">Quizzes</text>
    <text x="135" y="21" fill="white" font-size="14" text-anchor="middle">History</text>
  </g>

  <!-- Main Content -->
  <g transform="translate(260, 140)">
    
    <text x="0" y="0" fill="rgba(255,255,255,0.45)" font-size="11" font-weight="bold" letter-spacing="2">YOUR PROGRESS</text>
    <text x="0" y="32" fill="white" font-size="28" font-weight="bold">Attempt History</text>
    <text x="0" y="60" fill="rgba(255,255,255,0.5)" font-size="16">Review your past quiz attempts and scores.</text>
    
    <!-- History Item 1 -->
    <g transform="translate(0, 100)">
      <rect x="0" y="0" width="760" height="110" rx="16" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
      
      <!-- Content -->
      <text x="24" y="35" fill="white" font-size="18" font-weight="bold">JavaScript Fundamentals</text>
      <text x="24" y="60" fill="rgba(255,255,255,0.4)" font-size="14">Test your knowledge of core JavaScript concepts including variables...</text>
      
      <!-- Meta -->
      <circle cx="30" cy="85" r="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
      <text x="44" y="90" fill="rgba(255,255,255,0.4)" font-size="12">Oct 24, 2023, 02:45 PM</text>
      
      <circle cx="210" cy="85" r="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
      <text x="224" y="90" fill="rgba(255,255,255,0.4)" font-size="12">15 questions</text>

      <!-- Score & Action -->
      <g transform="translate(680, 25)">
        <text x="40" y="15" fill="#10b981" font-size="24" font-weight="bold" text-anchor="end">80%</text>
        <text x="40" y="35" fill="rgba(255,255,255,0.4)" font-size="12" text-anchor="end">12/15</text>
      </g>
      
      <rect x="620" y="15" width="116" height="36" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <text x="678" y="38" fill="white" font-size="14" font-weight="bold" text-anchor="middle">Review</text>
    </g>

    <!-- History Item 2 -->
    <g transform="translate(0, 230)">
      <rect x="0" y="0" width="760" height="110" rx="16" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
      
      <text x="24" y="35" fill="white" font-size="18" font-weight="bold">React Hooks Deep Dive</text>
      <text x="24" y="60" fill="rgba(255,255,255,0.4)" font-size="14">Advanced questions on useEffect, useMemo, useCallback, and perf...</text>
      
      <circle cx="30" cy="85" r="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
      <text x="44" y="90" fill="rgba(255,255,255,0.4)" font-size="12">Oct 20, 2023, 10:15 AM</text>
      
      <circle cx="210" cy="85" r="6" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
      <text x="224" y="90" fill="rgba(255,255,255,0.4)" font-size="12">20 questions</text>

      <g transform="translate(680, 25)">
        <text x="40" y="15" fill="#f59e0b" font-size="24" font-weight="bold" text-anchor="end">65%</text>
        <text x="40" y="35" fill="rgba(255,255,255,0.4)" font-size="12" text-anchor="end">13/20</text>
      </g>
      
      <rect x="620" y="15" width="116" height="36" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <text x="678" y="38" fill="white" font-size="14" font-weight="bold" text-anchor="middle">Review</text>
    </g>

  </g>

</svg>