<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <radialGradient id="topGlow" cx="20%" cy="10%" r="50%">
      <stop offset="0%" stop-color="rgba(147, 51, 234, 0.15)" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <linearGradient id="primaryBtn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  </style>

  <rect width="1280" height="720" fill="url(#bg)" />
  <rect width="1280" height="720" fill="url(#topGlow)" />

  <!-- Navbar -->
  <rect x="0" y="0" width="1280" height="64" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  
  <g transform="translate(120, 16)">
    <rect x="0" y="0" width="32" height="32" rx="8" fill="rgba(59, 130, 246, 0.2)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <path d="M16 8 L8 12 L16 16 L24 12 Z" fill="none" stroke="#93c5fd" stroke-width="1.5" />
    <path d="M8 18 L16 22 L24 18" fill="none" stroke="#93c5fd" stroke-width="1.5" />
    <text x="42" y="22" fill="white" font-size="16" font-weight="bold">Quiz Portal</text>
  </g>
  <g transform="translate(850, 16)">
    <text x="0" y="21" fill="rgba(255,255,255,0.7)" font-size="14">Quizzes</text>
    <text x="70" y="21" fill="rgba(255,255,255,0.7)" font-size="14">History</text>
    
    <rect x="135" y="0" width="115" height="32" rx="8" fill="rgba(59, 130, 246, 0.1)" />
    <text x="192" y="21" fill="#60a5fa" font-size="14" text-anchor="middle">+ Create Quiz</text>
    <text x="270" y="21" fill="rgba(255,255,255,0.7)" font-size="14">Manage</text>
  </g>

  <!-- Main Content -->
  <g transform="translate(260, 110)">
    <text x="0" y="0" fill="white" font-size="28" font-weight="bold">Create Quiz</text>
    <text x="0" y="28" fill="rgba(255,255,255,0.5)" font-size="16">Fill in the details below to create a new quiz.</text>

    <!-- Form Section 1 -->
    <g transform="translate(0, 60)">
      <rect x="0" y="0" width="760" height="300" rx="16" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
      
      <text x="24" y="32" fill="white" font-size="18" font-weight="bold">Quiz Details</text>
      
      <!-- Title -->
      <text x="24" y="70" fill="rgba(255,255,255,0.6)" font-size="14" font-weight="bold">Title</text>
      <rect x="24" y="80" width="712" height="44" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
      <text x="40" y="107" fill="rgba(255,255,255,0.3)" font-size="14">e.g. JavaScript Fundamentals</text>

      <!-- Description -->
      <text x="24" y="150" fill="rgba(255,255,255,0.6)" font-size="14" font-weight="bold">Description</text>
      <rect x="24" y="160" width="712" height="80" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
      <text x="40" y="187" fill="rgba(255,255,255,0.3)" font-size="14">Describe what this quiz covers...</text>

      <!-- Time Limit -->
      <text x="24" y="270" fill="rgba(255,255,255,0.6)" font-size="14" font-weight="bold">Time Limit (seconds)</text>
      <rect x="184" y="250" width="100" height="44" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
      <text x="234" y="278" fill="white" font-size="14" text-anchor="middle">300</text>
      <text x="300" y="278" fill="rgba(255,255,255,0.3)" font-size="12">5 min 0s</text>
    </g>

    <!-- Form Section 2 -->
    <g transform="translate(0, 390)">
      <text x="0" y="15" fill="white" font-size="18" font-weight="bold">Questions (1)</text>
      <rect x="620" y="0" width="140" height="36" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      <text x="690" y="23" fill="white" font-size="13" font-weight="bold" text-anchor="middle">+ Add Question</text>
      
      <!-- Question Block -->
      <rect x="0" y="40" width="760" height="200" rx="16" fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
      
      <rect x="24" y="60" width="90" height="24" rx="12" fill="rgba(59, 130, 246, 0.2)" stroke="rgba(59, 130, 246, 0.3)" stroke-width="1" />
      <text x="69" y="76" fill="#60a5fa" font-size="12" font-weight="bold" text-anchor="middle">Question 1</text>
      
      <text x="24" y="115" fill="rgba(255,255,255,0.6)" font-size="14" font-weight="bold">Question Text</text>
      <rect x="24" y="125" width="712" height="44" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
      <text x="40" y="152" fill="rgba(255,255,255,0.3)" font-size="14">Enter your question...</text>
      
      <!-- Option Rows -->
       <text x="24" y="200" fill="rgba(255,255,255,0.6)" font-size="14" font-weight="bold">Options</text>
       
       <rect x="24" y="210" width="40" height="40" rx="8" fill="#10b981" />
       <text x="44" y="235" fill="white" font-size="14" font-weight="bold" text-anchor="middle">A</text>
       <rect x="74" y="210" width="400" height="40" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
       <text x="88" y="235" fill="rgba(255,255,255,0.3)" font-size="14">Option A</text>
       <text x="490" y="235" fill="#34d399" font-size="12">✓ Correct</text>
    </g>

  </g>

</svg>